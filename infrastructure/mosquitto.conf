# Mosquitto configuration for FastAPI Boiler Plate

# Network settings
listener 1883
protocol mqtt

# Allow anonymous connections (for development)
allow_anonymous true

# Persistence
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest stdout
log_dest file /mosquitto/log/mosquitto.log
log_type all
log_timestamp true

# Security (basic)
password_file /mosquitto/config/passwd

# WebSocket support
listener 9001
protocol websockets

# Connection settings
max_connections 100
max_keepalive 3600
max_packet_size 0

# Message settings
max_inflight_messages 20
max_queued_messages 100

# Bridge settings (if needed)
# connection bridge-1
# address localhost:1884
# topic metrics/# out 0
